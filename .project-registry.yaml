  description_long: |
    Klinscore is an open-source clinical score calculator implementing
    evidence-based risk scores across cardiology, nephrology, and
    anaesthesiology, following German and European guidelines (ESC, AWMF,
    KDIGO).

    Designed to be maintainable by clinicians rather than developers — the
    score definitions are data-driven and separated from the application logic,
    so updating or adding scores does not require code changes.

    ## Supported Score Categories

    - Cardiology (ESC guidelines)
    - Nephrology (KDIGO guidelines)
    - Anaesthesiology (AWMF guidelines)

    ## Interface

    German/English bilingual interface. Runs locally with no network
    dependency.